    <text x="755" y="472" fill="#fbbf24" text-anchor="middle">Open Source</text>
  </g>

  <!-- URL -->
  <text x="600" y="560" font-family="monospace" font-size="22" fill="#475569" text-anchor="middle">bingoo.app.br</text>

  <!-- Squad4Tech -->
  <text x="600" y="600" font-family="system-ui, sans-serif" font-size="14" fill="#334155" text-anchor="middle">
